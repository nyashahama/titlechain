name: migrations

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: titlechain
          POSTGRES_USER: titlechain
          POSTGRES_PASSWORD: titlechain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U titlechain -d titlechain"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://titlechain:titlechain@localhost:5432/titlechain?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
      - run: bash scripts/ci/check-db.sh
